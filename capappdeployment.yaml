apiVersion: apps/v1
kind: Deployment
metadata:
  name: cap-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: cap
  template:
    metadata:
      labels:
        app: cap
    spec:
      containers:
      - name: flask
        image: raveendra137/captain:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000

